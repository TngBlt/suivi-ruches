name: 🚀 Deploy to Yunohost

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: 18
  DEPLOY_USER: www-data
  DEPLOY_HOST: nuuull.org
  DEPLOY_PATH: /opt/yunohost/suivi-ruches

jobs:
  # ============ TESTS ============
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint --if-present
        continue-on-error: true

      - name: ✅ Test
        run: npm test --if-present
        continue-on-error: true

  # ============ SECURITY ============
  security:
    name: 🔒 Security Check
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🔐 Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --debug

  # ============ BUILD ============
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [test, security]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --production

      - name: 🏗️ Build
        run: |
          echo "✅ Build successful"
          npm list

      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build
          path: |
            src/
            server.js
            package*.json
          retention-days: 1

  # ============ DEPLOY (seulement sur push main) ============
  deploy:
    name: 🚀 Deploy to Yunohost
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🔑 Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: 📥 Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: build

      - name: 📤 Deploy files via SCP
        run: |
          echo "📤 Uploading files..."
          scp -i ~/.ssh/deploy_key -r \
            src/ \
            server.js \
            package*.json \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: 🔄 Restart service
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} \
            "sudo systemctl restart suivi-ruches"

      - name: ✅ Health check
        run: |
          sleep 5
          curl -f https://bee.nuuull.org/api/health || \
          curl -f http://localhost:3000/ || \
          echo "⚠️ Health check skipped (firewall)"

      - name: 📢 Notify success
        if: success()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Déployé avec succès sur https://bee.nuuull.org'
            })

      - name: 📢 Notify failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Erreur de déploiement. Vérifiez les logs.'
            })

      - name: 🧹 Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          rm -f ~/.ssh/known_hosts

  # ============ NOTIFICATION ============
  notify:
    name: 📧 Notifications
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    
    steps:
      - name: 📧 Email Slack (optionnel)
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Suivi Ruches - Déploiement ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Suivi Ruches Deployment*\nStatus: `${{ job.status }}`\nRef: `${{ github.ref }}`\nCommit: `${{ github.sha }}`"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        if: always()
